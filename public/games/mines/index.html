<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mines — SportyBet</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="../_speedbet-theme.css" />
</head>
<body>
<div class="bg-grid"></div>
<div class="particles" id="particles"></div>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28"><polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="none" stroke="#f5c518" stroke-width="1.5"/><polygon points="14,6 22,10 22,18 14,22 6,18 6,10" fill="#f5c518" opacity="0.2"/><line x1="14" y1="2" x2="14" y2="6" stroke="#f5c518" stroke-width="1"/><line x1="26" y1="8" x2="22" y2="10" stroke="#f5c518" stroke-width="1"/><line x1="26" y1="20" x2="22" y2="18" stroke="#f5c518" stroke-width="1"/><line x1="14" y1="26" x2="14" y2="22" stroke="#f5c518" stroke-width="1"/><line x1="2" y1="20" x2="6" y2="18" stroke="#f5c518" stroke-width="1"/><line x1="2" y1="8" x2="6" y2="10" stroke="#f5c518" stroke-width="1"/></svg>
      <span class="logo-text">MINES</span>
    </div>
    <div class="header-right">
      <div class="balance-wrap">
        <span class="balance-label">Balance</span>
        <span class="balance-val" id="balance">GHS 1,000.00</span>
      </div>
    </div>
  </header>

  <div class="game-wrap">
    <!-- Left Panel -->
    <aside class="panel">
      <div class="panel-section">
        <label class="field-label">Bet Amount</label>
        <div class="bet-input-wrap">
          <button class="bet-adj" onclick="adjBet(0.5)">½</button>
          <input type="number" id="betAmt" class="bet-input" value="10" min="1" max="10000"/>
          <button class="bet-adj" onclick="adjBet(2)">2×</button>
        </div>
        <div class="quick-bets">
          <button class="qb" onclick="setBet(5)">5</button>
          <button class="qb" onclick="setBet(10)">10</button>
          <button class="qb" onclick="setBet(50)">50</button>
          <button class="qb" onclick="setBet(100)">100</button>
        </div>
      </div>

      <div class="panel-section">
        <label class="field-label">Mines Count</label>
        <div class="mines-display">
          <button class="mine-adj" onclick="adjMines(-1)">−</button>
          <div class="mines-count-wrap">
            <span class="mines-count" id="minesCount">3</span>
            <span class="mines-sub">mines</span>
          </div>
          <button class="mine-adj" onclick="adjMines(1)">+</button>
        </div>
        <input type="range" id="mineSlider" min="1" max="24" value="3" oninput="syncMines()" class="mine-slider"/>
        <div class="mine-extremes">
          <span>1 — Safe</span>
          <span>24 — Risky</span>
        </div>
      </div>

      <div class="panel-section stats-grid">
        <div class="stat-card">
          <div class="stat-label">Multiplier</div>
          <div class="stat-val" id="multStat">1.00×</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Profit</div>
          <div class="stat-val green" id="profitStat">+0.00</div>
        </div>
        <div class="stat-card full">
          <div class="stat-label">Next tile win</div>
          <div class="stat-val amber" id="nextStat">GHS 10.00</div>
        </div>
      </div>

      <div class="panel-section">
        <div class="safe-bar-label">
          <span>Safe tile probability</span>
          <span id="safePct" class="safe-pct">88%</span>
        </div>
        <div class="safe-bar-track">
          <div class="safe-bar-fill" id="safeBar" style="width:88%"></div>
        </div>
      </div>

      <button class="btn-start" id="startBtn" onclick="startOrCashOut()">
        <span id="startLabel">Place Bet</span>
        <svg width="18" height="18" viewBox="0 0 18 18"><polygon points="4,2 16,9 4,16" fill="currentColor"/></svg>
      </button>

      <div class="msg-wrap" id="msgWrap">
        <div class="msg" id="msg">Pick your bet and hit Place Bet!</div>
      </div>
    </aside>

    <!-- Grid -->
    <main class="grid-main">
      <div class="grid" id="grid"></div>
      <div class="grid-overlay" id="gridOverlay" style="display:none">
        <div class="overlay-content" id="overlayContent"></div>
      </div>
    </main>
  </div>

  <!-- History -->
  <div class="history-wrap">
    <div class="history-label">Recent rounds</div>
    <div class="history" id="history"></div>
  </div>
</div>

<!-- Particle burst container -->
<div id="burst" class="burst"></div>

<script src="game.js"></script>
</body>
</html>
