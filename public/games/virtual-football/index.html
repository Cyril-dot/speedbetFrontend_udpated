<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VIRTUAL FOOTBALL — INSTANT VIRTUALS</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../_speedbet-theme.css" />
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="logo">⚽ VIRTUAL FOOTBALL</div>
    <div class="balance-wrap">
      <span class="balance-label">BALANCE</span>
      <span class="balance-val" id="balanceDisplay">$1,000.00</span>
    </div>
  </header>

  <main class="game-container">

    <!-- CENTER: PITCH -->
    <section class="pitch-section">
      <canvas id="pitchCanvas"></canvas>
      <div class="events-feed" id="eventsFeed"></div>
      <div class="countdown-wrap" id="countdownWrap">
        <div class="countdown-label">NEXT MATCH IN</div>
        <div class="countdown-val" id="countdownVal">8</div>
      </div>

      <!-- Auth gate lives inside pitch on mobile so it overlays everything -->
      <div class="auth-gate hidden" id="auth-gate">
        <p class="auth-gate-msg" id="auth-gate-msg">Sign in to play.</p>
        <div class="auth-form">
          <input class="auth-input" id="authEmail" type="email" placeholder="Email" autocomplete="email" />
          <input class="auth-input" id="authPassword" type="password" placeholder="Password" autocomplete="current-password" />
          <button class="btn-login" id="btnLogin">SIGN IN</button>
          <button class="btn-demo" id="btnDemoUser">DEMO PLAY</button>
          <div class="auth-error" id="authError"></div>
        </div>
      </div>
    </section>

    <!-- LEFT / BOTTOM: BETTING PANEL -->
    <aside class="bet-panel glass-panel" id="betPanel">
      <h3 class="panel-title">PLACE BET</h3>

      <!-- Match Info -->
      <div class="match-info">
        <div class="team home">
          <span class="team-name" id="homeTeam">RED DEVILS</span>
          <span class="team-color" id="homeColor" style="background:#E8003D"></span>
        </div>
        <div class="vs">VS</div>
        <div class="team away">
          <span class="team-color" id="awayColor" style="background:#00D4FF"></span>
          <span class="team-name" id="awayTeam">BLUE EAGLES</span>
        </div>
      </div>

      <!-- Score Display -->
      <div class="score-display">
        <div class="score" id="homeScore">0</div>
        <div class="score-divider">:</div>
        <div class="score" id="awayScore">0</div>
      </div>

      <!-- Timer -->
      <div class="timer-wrap">
        <div class="timer-label">MATCH TIME</div>
        <div class="timer-value" id="timerValue">90:00</div>
        <div class="timer-bar-track">
          <div class="timer-bar-fill" id="timerBar"></div>
        </div>
      </div>

      <!-- Betting Options -->
      <div class="bet-section">
        <div class="bet-label">1X2 MARKET</div>
        <div class="market-btns">
          <button class="mkt-btn" data-bet="home" id="btnHome">
            <span class="mkt-label">HOME</span>
            <span class="mkt-odds" id="homeOdds">2.10</span>
          </button>
          <button class="mkt-btn" data-bet="draw" id="btnDraw">
            <span class="mkt-label">DRAW</span>
            <span class="mkt-odds" id="drawOdds">3.40</span>
          </button>
          <button class="mkt-btn" data-bet="away" id="btnAway">
            <span class="mkt-label">AWAY</span>
            <span class="mkt-odds" id="awayOdds">2.90</span>
          </button>
        </div>
      </div>

      <div class="bet-section">
        <div class="bet-label">OVER / UNDER 2.5</div>
        <div class="market-btns two-col">
          <button class="mkt-btn" data-bet="over" id="btnOver">
            <span class="mkt-label">OVER 2.5</span>
            <span class="mkt-odds" id="overOdds">1.85</span>
          </button>
          <button class="mkt-btn" data-bet="under" id="btnUnder">
            <span class="mkt-label">UNDER 2.5</span>
            <span class="mkt-odds" id="underOdds">1.95</span>
          </button>
        </div>
      </div>

      <!-- Bet Amount -->
      <div class="bet-section">
        <label class="field-label bet-label">BET AMOUNT</label>
        <div class="bet-input-row">
          <button class="btn-adj" id="adjHalf">½</button>
          <input class="bet-input" id="betAmt" type="number" value="10" min="1" max="1000" inputmode="decimal" />
          <button class="btn-adj" id="adjDouble">2×</button>
        </div>
        <div class="quick-bets">
          <button class="btn-quick" data-amount="5">$5</button>
          <button class="btn-quick" data-amount="10">$10</button>
          <button class="btn-quick" data-amount="25">$25</button>
          <button class="btn-quick" data-amount="50">$50</button>
        </div>
      </div>

      <!-- Selected Bet -->
      <div class="selected-bet">
        <span class="sel-label">SELECTED:</span>
        <span class="sel-value" id="selValue">None</span>
      </div>

      <button class="btn-bet" id="placeBetBtn">PLACE BET</button>

      <div class="bet-status" id="betStatus"></div>

      <!-- Match Stats -->
      <div class="stats-inline">
        <div class="panel-title" style="margin-top:0.5rem">MATCH STATS</div>
        <div class="stat-row">
          <span class="stat-label" id="homeStatsLabel">RED DEVILS</span>
          <span class="stat-value" id="homeShots">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Shots on Target</span>
          <span class="stat-value" id="homeShotsOnTarget">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Possession</span>
          <span class="stat-value" id="homePossession">50%</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Corners</span>
          <span class="stat-value" id="homeCorners">0</span>
        </div>
        <hr class="stat-divider" />
        <div class="stat-row">
          <span class="stat-label" id="awayStatsLabel">BLUE EAGLES</span>
          <span class="stat-value" id="awayShots">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Shots on Target</span>
          <span class="stat-value" id="awayShotsOnTarget">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Possession</span>
          <span class="stat-value" id="awayPossession">50%</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Corners</span>
          <span class="stat-value" id="awayCorners">0</span>
        </div>
      </div>
    </aside>

  </main>

  <!-- MOBILE BOTTOM TAB BAR -->
  <nav class="mobile-tabs" id="mobileTabs">
    <div class="mobile-tabs-inner">
      <button class="tab-btn active" data-tab="pitch" id="tabPitch">
        <span class="tab-icon">⚽</span>
        <span>PITCH</span>
      </button>
      <button class="tab-btn" data-tab="bet" id="tabBet">
        <span class="tab-icon">🎯</span>
        <span>BET</span>
      </button>
      <button class="tab-btn" data-tab="stats" id="tabStats">
        <span class="tab-icon">📊</span>
        <span>STATS</span>
      </button>
    </div>
  </nav>

  <script src="game.js"></script>
  <script>
    /* ── MOBILE TAB SWITCHING ── */
    (function() {
      var isMobile = function() { return window.innerWidth <= 768; };

      var pitchSection = document.querySelector('.pitch-section');
      var betPanel     = document.getElementById('betPanel');
      var statsInline  = betPanel ? betPanel.querySelector('.stats-inline') : null;
      var tabBtns      = document.querySelectorAll('.tab-btn');

      function activateTab(tab) {
        if (!isMobile()) return;

        tabBtns.forEach(function(b) { b.classList.remove('active'); });
        document.querySelector('[data-tab="' + tab + '"]').classList.add('active');

        if (tab === 'pitch') {
          pitchSection.style.display = '';
          // On pitch tab: show pitch large, hide bet panel
          pitchSection.style.flex = '1';
          if (betPanel) betPanel.style.display = 'none';
        } else if (tab === 'bet') {
          pitchSection.style.flex = '0 0 42%';
          pitchSection.style.display = '';
          if (betPanel) {
            betPanel.style.display = 'flex';
            // Show all except stats
            if (statsInline) statsInline.style.display = 'none';
          }
        } else if (tab === 'stats') {
          pitchSection.style.flex = '0 0 42%';
          pitchSection.style.display = '';
          if (betPanel) {
            betPanel.style.display = 'flex';
            if (statsInline) statsInline.style.display = '';
            // Scroll to stats
            setTimeout(function() {
              if (statsInline) statsInline.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 50);
          }
        }
      }

      tabBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          activateTab(btn.dataset.tab);
        });
      });

      // On desktop, reset inline styles
      window.addEventListener('resize', function() {
        if (!isMobile()) {
          if (pitchSection) pitchSection.style = '';
          if (betPanel)     betPanel.style     = '';
          if (statsInline)  statsInline.style  = '';
        } else {
          activateTab('bet'); // default to bet tab on mobile
        }
      });

      // Init on mobile
      if (isMobile()) {
        activateTab('bet');
        // Set default tab active
        tabBtns.forEach(function(b) { b.classList.remove('active'); });
        document.getElementById('tabBet').classList.add('active');
      }

      // Wire adj buttons (inline onclick removed for CSP friendliness)
      var adjHalf   = document.getElementById('adjHalf');
      var adjDouble = document.getElementById('adjDouble');
      var betAmt    = document.getElementById('betAmt');

      if (adjHalf) adjHalf.addEventListener('click', function() {
        if (betAmt) betAmt.value = Math.max(1, Math.round(parseFloat(betAmt.value || 10) * 0.5 * 100) / 100);
      });
      if (adjDouble) adjDouble.addEventListener('click', function() {
        if (betAmt) betAmt.value = Math.min(100000, Math.round(parseFloat(betAmt.value || 10) * 2 * 100) / 100);
      });

      document.querySelectorAll('.btn-quick').forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (betAmt) betAmt.value = btn.dataset.amount;
        });
      });
    })();
  </script>
</body>
</html>
